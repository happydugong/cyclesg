name: Feature request
description: Suggest an improvement for CycleSG
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to CycleSG.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What are you trying to do, and what is missing today?
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature you want.
      placeholder: It would help if CycleSG could...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List any workarounds or alternative approaches you have tried.
      placeholder: I tried...
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, links, route examples, or other details here.
