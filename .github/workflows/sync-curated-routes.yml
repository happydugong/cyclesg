name: Sync Curated Routes Overlay

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-curated-routes:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync curated Google My Maps overlay
        run: pnpm sync:curated-routes

      - name: Commit and push changes
        run: |
          if git diff --quiet -- src/assets/curated-routes.geojson src/assets/curated-routes-metadata.json; then
            echo "No curated routes data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/assets/curated-routes.geojson src/assets/curated-routes-metadata.json
          git commit -m "chore: sync curated routes overlay"
          git push
