name: Refresh Google My Maps Data

on:
  workflow_dispatch:
    inputs:
      overlay_id:
        description: Required. Provide exactly one Google My Maps overlay id.
        required: true
        type: string

permissions:
  contents: write

jobs:
  refresh-google-my-maps-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh Google My Maps route assets
        env:
          OVERLAY_SOURCE_ID: ${{ inputs.overlay_id }}
        run: pnpm sync:my-maps-overlays

      - name: Commit and push changes
        run: |
          if git diff --quiet -- src/assets/curated-routes.geojson src/assets/curated-routes-metadata.json; then
            echo "No curated routes data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/assets/curated-routes.geojson src/assets/curated-routes-metadata.json
          git commit -m "chore: refresh google my maps data"
          git push
