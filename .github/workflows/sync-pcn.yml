name: Sync Cycling Data

on:
  workflow_dispatch:
  schedule:
    - cron: '15 3 * * 1'

permissions:
  contents: write

jobs:
  sync-datasets:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync official cycling datasets
        run: pnpm sync:pcn

      - name: Commit and push changes
        run: |
          if git diff --quiet -- src/assets/pcn.geojson src/assets/pcn-metadata.json src/assets/cycling-paths.geojson src/assets/cycling-paths-metadata.json; then
            echo "No cycling data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/assets/pcn.geojson src/assets/pcn-metadata.json src/assets/cycling-paths.geojson src/assets/cycling-paths-metadata.json
          git commit -m "chore: sync cycling data"
          git push
